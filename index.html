    .content-overlay {

    .premium-badge {

    .border-shape { height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    .invitation-card {

      max-width: 380px;
      aspect-ratio: 3 / 4;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      margin: 0 auto;

    .card-bg {

      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background-size: cover;
      background-position: center;

    .bg-overlay {

      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

    .card-border {
      position: absolute;
      top: -3px;

      bottom: -3px;

      pointer-events: none;
      border-radius: 20px;

    .card-border svg { width: 100%; height: 100%; }
    .content-backdrop {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      bottom: 12px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(2px);
      border-radius: 12px;
      z-index: 4;

    .card-content {
      position: relative;
      z-index: 6;
      width: 100%;
      height: 100%;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      text-align: center;
      overflow-y: auto;

    .center-watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-25deg);

      font-size: 16px;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.25);
      background: rgba(0,0,0,0.15);

    .header-decoration { font-size: 18px; margin-bottom: 3px; }
    .invitation-header { font-size: 11px; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; padding-bottom: 4px; display: inline-block; border-bottom: 1px solid rgba(255,255,255,0.4); }
    .family-line { font-size: 10px; line-height: 1.4; margin-bottom: 6px; font-weight: 500; }
    .couple-names { font-size: 16px; font-weight: bold; margin: 4px 0; line-height: 1.2; }
    .couple-names .amp { font-size: 13px; margin: 1px 0; }
    .event-details { font-size: 9.5px; line-height: 1.5; margin: 4px 0; }
    .blessings { font-size: 9px; font-style: italic; margin: 5px 0; padding: 5px; background: rgba(255,255,255,0.1); border-radius: 6px; }
    .rsvp-section { font-size: 9px; margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.3); }

      background: linear-gradient(105deg, #d99938, #c2862c);
      border: none;
      padding: 0.5rem 0.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.75rem;
      color: white;
      cursor: pointer;
      width: 100%;
      margin-top: 0.8rem;

    .save-card-btn:hover { transform: translateY(-2px); }
    .save-card-btn.disabled { opacity: 0.5; cursor: not-allowed; background: #a0a0a0; }
    .save-card-btn.disabled:hover { transform: none; }

    /* Upgrade Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);

    .modal.active { display: flex; }

    .pricing-card {

    .pricing-card.recommended {

    .recommended-badge {

      top: 10px;

      color: #1a4f5e;
      font-size: 0.65rem;

    .price { font-size: 1.8rem; font-weight: 800; color: #1f6575; }
    .feature-list { text-align: left; margin-top: 1rem; }
    .feature-list li { font-size: 0.75rem; padding: 0.25rem 0; display: flex; align-items: center; gap: 0.5rem; }
    .feature-list li i.fa-check { color: #10b981; width: 18px; }
    .feature-list li i.fa-times { color: #ef4444; width: 18px; }
    .feature-list li i.fa-star { color: #f59e0b; width: 18px; }

    .promo-input {
      border: 1px solid #e0e8f0;
      border-radius: 40px;
      padding: 0.5rem 1rem;
      width: 100%;
      font-size: 0.8rem;
    }
    .apply-btn {
      background: #1f6575;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .transaction-item {
      background: #f8fafd;
      border-radius: 12px;

    .premium-lock-overlay {

      pointer-events: none;
    }

      border-radius: 40px;

    .gallery-title {

      font-weight: 800;
      color: #1f6575;

      padding: 0.4rem 1.2rem;

    .cards-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .saved-card {
      background: rgba(255,255,255,0.95);
      border-radius: 1rem;

    @media (max-width: 900px) {
      .two-cards-row { grid-template-columns: 1fr; }
      .modal-content { width: 95%; padding: 1rem; }
      .pricing-card { margin-bottom: 1rem; }
    }
  </style>

<body>

  <canvas id="dropCanvas"></canvas>

  <div class="content-overlay" id="appContainer"></div>

  <script>
    // ==================== RAIN CANVAS ====================
    const canvas = document.getElementById('dropCanvas');
    let ctx = canvas.getContext('2d');
    let drops = [];
    function initCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const dropCount = Math.min(40, Math.floor(window.innerWidth / 30));
      drops = [];
      for (let i = 0; i < dropCount; i++) {
        drops.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: 1.5 + Math.random() * 3, speedY: 0.5 + Math.random() * 1.5, color: `rgba(180, 230, 255, ${0.1 + Math.random() * 0.2})` });
      }
    }
    function drawDrops() { if (!ctx) return; ctx.clearRect(0, 0, canvas.width, canvas.height); for (let drop of drops) { ctx.beginPath(); ctx.arc(drop.x, drop.y, drop.radius, 0, Math.PI * 2); ctx.fillStyle = drop.color; ctx.fill(); } }
    function updateDrops() { for (let drop of drops) { drop.y += drop.speedY; if (drop.y - drop.radius > canvas.height) { drop.y = -drop.radius; drop.x = Math.random() * canvas.width; } } }
    function animateRain() { updateDrops(); drawDrops(); requestAnimationFrame(animateRain); }
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initCanvas(); });
    initCanvas(); animateRain();

    // ==================== TRANSLATIONS ====================

        borderFlowers: "Flowers", borderBubbles: "Bubbles", borderStars: "Stars", borderHearts: "Hearts", borderLeaves: "Leaves",
        fontFamily: "Font Family", textColor: "Text Color", fontClassic: "Classic", fontElegant: "Elegant", fontModern: "Modern", fontScript: "Script", fontClean: "Clean",
        colorWhite: "White", colorGold: "Gold", colorPink: "Pink", colorCoral: "Coral", colorSky: "Sky", colorMint: "Mint", colorPlum: "Plum",

    const promoCodes = {
      'WELCOME20': { discount: 20, type: 'percentage', validFor: ['monthly', 'lifetime'] },
      'INVI50': { discount: 50, type: 'percentage', validFor: ['lifetime'] },
      'TRIAL2024': { discount: 100, type: 'percentage', validFor: ['trial'], isTrial: true, trialDays: 1 }
    };

    function hasPremiumAccess(user) {
      if (!user?.subscription) return false;
      if (user.subscription.type === 'premium_lifetime' && user.subscription.isActive) return true;
      if (user.subscription.type === 'premium_monthly' && user.subscription.isActive) {
        const endDate = new Date(user.subscription.endDate);
        return endDate > new Date();
      }
      if (user.subscription.type === 'trial' && user.subscription.isActive) {
        const endDate = new Date(user.subscription.endDate);
        return endDate > new Date();
      }
      return false;
    }

    function checkAndUpdateSubscription() {
      if (!currentUser?.subscription) return false;
      const sub = currentUser.subscription;
      if ((sub.type === 'premium_monthly' || sub.type === 'trial') && sub.isActive) {
        const endDate = new Date(sub.endDate);
        if (endDate <= new Date()) {
          currentUser.subscription.isActive = false;
          currentUser.subscription.type = 'free';
          saveCurrentUser();
          showToast(translations[currentLang].limitReached, 'warning');
          return true;
        }
      }
      return false;
    }

    function getRemainingDays(user) {
      if (!user?.subscription?.endDate) return 0;
      const end = new Date(user.subscription.endDate);
      const now = new Date();
      const diff = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
      return diff > 0 ? diff : 0;
    }

    function validatePromoCode(code, packageType) {
      const promo = promoCodes[code.toUpperCase()];
      if (!promo) return { valid: false, message: translations[currentLang].invalidPromo || 'Invalid promo code' };
      if (!promo.validFor.includes(packageType)) {
        return { valid: false, message: `Promo code not valid for ${packageType} package` };
      }
      return { valid: true, discount: promo.discount, type: promo.type, isTrial: promo.isTrial || false, trialDays: promo.trialDays || 1 };
    }

    async function processPayment(packageType, paymentMethod, promoCode = null) {
      return new Promise((resolve) => {
        setTimeout(() => {
          let originalAmount = packageType === 'monthly' ? 10000 : packageType === 'lifetime' ? 150000 : 0;
          let discount = 0;
          let finalAmount = originalAmount;
          let usedPromo = null;
          let isTrial = false;
          let trialDays = 0;

          if (promoCode) {
            const promoResult = validatePromoCode(promoCode, packageType);
            if (promoResult.valid) {
              if (promoResult.isTrial) {
                isTrial = true;
                trialDays = promoResult.trialDays;
                finalAmount = 0;
              } else {
                discount = promoResult.discount;
                finalAmount = originalAmount - (originalAmount * discount / 100);
              }
              usedPromo = promoCode.toUpperCase();
            }
          }

          const transactionId = 'TXN_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8).toUpperCase();
          
          const transaction = {
            id: transactionId, userId: currentUser.id, packageType: packageType,
            originalAmount: originalAmount, discount: discount, finalAmount: finalAmount,
            promoCode: usedPromo, paymentMethod: paymentMethod, status: 'completed',
            createdAt: new Date().toISOString(), isTrial: isTrial, trialDays: trialDays
          };
          transactions.unshift(transaction);
          localStorage.setItem('invisys_transactions', JSON.stringify(transactions));
          
          const endDate = isTrial ? new Date(Date.now() + trialDays * 24 * 60 * 60 * 1000).toISOString() :
                          packageType === 'monthly' ? new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString() : null;
          
          currentUser.subscription = {
            type: isTrial ? 'trial' : (packageType === 'monthly' ? 'premium_monthly' : 'premium_lifetime'),
            startDate: new Date().toISOString(), endDate: endDate, isActive: true,
            paymentStatus: 'paid', transactionId: transactionId
          };
          saveCurrentUser();
          resolve({ success: true, transactionId, finalAmount, isTrial });
        }, 1500);
      });
    }

    function saveUsers() { localStorage.setItem('invisys_users', JSON.stringify(users)); }
    function saveCurrentUser() { localStorage.setItem('invisys_currentUser', JSON.stringify(currentUser)); }
    
    function showToast(msg, type = 'info') {

      toast.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${type === 'error' ? '#c95a4e' : type === 'warning' ? '#f59e0b' : '#1f6575'};color:white;padding:8px 20px;border-radius:40px;font-size:0.8rem;z-index:9999999;`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

      switch(type) {
        case 'flowers': return generateFlowerBorder('#d4af37', '#90EE90');
        case 'bubbles': return generateBubbleBorder('#FFD700', '#FFFFFF');
        case 'stars': return generateStarBorder('#FFD700', '#FFFACD');
        case 'hearts': return generateHeartBorder('#FF69B4', '#FFB6C1');
        case 'leaves': return generateLeafBorder('#DAA520', '#90EE90');
        default: return generateFlowerBorder('#d4af37', '#90EE90');
      }
    }

    // ==================== AUTH FUNCTIONS ====================
    function validateEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
    
    function handleLogin(event) {
      event.preventDefault();
      const t = translations[currentLang];
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      
      if (!validateEmail(email)) { showMessage('loginMessage', t.invalidEmail, true); return; }
      
      const user = users.find(u => u.email === email && u.password === password);
      if (user) {
        currentUser = { ...user };
        if (!currentUser.subscription) currentUser.subscription = { type: 'free', isActive: true };
        saveCurrentUser();
        showMessage('loginMessage', 'Login successful!', false);
        setTimeout(() => { currentPage = 'creator'; renderApp(); }, 500);
      } else {
        showMessage('loginMessage', t.loginError, true);
      }
    }
    
    function handleRegister(event) {
      event.preventDefault();
      const t = translations[currentLang];
      const fullName = document.getElementById('regFullName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;
      
      if (!fullName) { showMessage('registerMessage', 'Please enter your full name', true); return; }
      if (!validateEmail(email)) { showMessage('registerMessage', t.invalidEmail, true); return; }
      if (password.length < 6) { showMessage('registerMessage', t.passwordShort, true); return; }
      if (password !== confirmPassword) { showMessage('registerMessage', t.passwordsMismatch, true); return; }
      if (users.some(u => u.email === email)) { showMessage('registerMessage', t.emailExists, true); return; }
      
      const newUser = { 
        id: Date.now(), fullName, email, password,
        subscription: { type: 'free', isActive: true }, cardsCount: 0,
        createdAt: new Date().toISOString()
      };
      users.push(newUser);
      saveUsers();
      showMessage('registerMessage', t.registerSuccess, false);
      setTimeout(() => { showLoginPage(); }, 1500);
    }
    
    function handleLogout() { currentUser = null; saveCurrentUser(); renderApp(); }

        setTimeout(() => { if (el) el.innerHTML = ''; }, 3000);
      }

                <li><i class="fas fa-times text-red-500"></i> Remove watermark</li>
              </ul>
            </div>
          </div>
          
          <div class="pricing-card recommended" id="monthlyPlan" onclick="selectPackage('monthly')">
            <div class="recommended-badge">RECOMMENDED</div>
            <div class="text-center">
              <i class="fas fa-calendar-alt text-2xl text-amber-500 mb-2"></i>
              <h3 class="font-bold text-lg">${t.monthlyPlan}</h3>
              <div class="price" id="monthlyPrice">TSh 10,000</div>
              <div class="text-xs text-gray-500">${t.perMonth}</div>
              <ul class="feature-list mt-3">
                <li><i class="fas fa-check text-green-500"></i> ${t.featuresUnlimited}</li>
                <li><i class="fas fa-check text-green-500"></i> ${t.featuresAllTemplates}</li>
                <li><i class="fas fa-check text-green-500"></i> ${t.featuresCustomBg}</li>
                <li><i class="fas fa-check text-green-500"></i> ${t.featuresRemoveWatermark}</li>
                <li><i class="fas fa-star text-amber-500"></i> ${t.featuresCancel}</li>
              </ul>
            </div>
          </div>
          
          <div class="pricing-card" id="lifetimePlan" onclick="selectPackage('lifetime')">
            <div class="text-center">
              <i class="fas fa-infinity text-2xl text-amber-500 mb-2"></i>
              <h3 class="font-bold text-lg">${t.lifetimePlan}</h3>
              <div class="price" id="lifetimePrice">TSh 150,000</div>
              <div class="text-xs text-gray-500">${t.oneTime}</div>
              <ul class="feature-list mt-3">
                <li><i class="fas fa-check text-green-500"></i> ${t.featuresUnlimited}</li>
                <li><i class="fas fa-check text-green-500"></i> ${t.featuresAllTemplates}</li>
                <li><i class="fas fa-check text-green-500"></i> ${t.featuresCustomBg}</li>
                <li><i class="fas fa-check text-green-500"></i> ${t.featuresRemoveWatermark}</li>
                <li><i class="fas fa-star text-amber-500"></i> ${t.featuresNeverExpires}</li>
              </ul>
            </div>
          </div>
        </div>
        
        <div class="bg-amber-50 p-4 rounded-xl mb-4">
          <div class="flex gap-2">
            <input type="text" id="promoCodeInput" class="promo-input flex-1" placeholder="${t.promoPlaceholder}">
            <button class="apply-btn" onclick="applyPromoCode()">${t.apply}</button>
          </div>
          <div id="promoMessage" class="text-xs mt-2"></div>
        </div>
        
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-2">${t.paymentMethod}</label>
          <div class="grid grid-cols-3 gap-2">
            <button class="payment-method-btn p-2 border rounded-lg text-center" data-method="m-pesa" onclick="selectPaymentMethod('m-pesa')">
              <i class="fas fa-mobile-alt text-green-600"></i>
              <div class="text-xs">M-PESA</div>
            </button>
            <button class="payment-method-btn p-2 border rounded-lg text-center" data-method="bank" onclick="selectPaymentMethod('bank')">
              <i class="fas fa-university text-blue-600"></i>
              <div class="text-xs">Bank</div>
            </button>
            <button class="payment-method-btn p-2 border rounded-lg text-center" data-method="card" onclick="selectPaymentMethod('card')">
              <i class="fas fa-credit-card text-purple-600"></i>
              <div class="text-xs">Card</div>
            </button>
          </div>
        </div>
        
        <div class="bg-gray-100 p-3 rounded-lg mb-4">
          <div class="flex justify-between text-sm">
            <span>${t.subtotal}:</span>
            <span id="summarySubtotal">TSh 10,000</span>
          </div>
          <div class="flex justify-between text-sm text-green-600" id="summaryDiscountRow" style="display: none;">
            <span>${t.discount}:</span>
            <span id="summaryDiscount">-TSh 0</span>
          </div>
          <div class="flex justify-between font-bold mt-2 pt-2 border-t">
            <span>${t.total}:</span>
            <span id="summaryTotal">TSh 10,000</span>
          </div>
        </div>
        
        <div id="paymentStatus" class="text-center mb-3"></div>
        
        <button class="w-full bg-gradient-to-r from-amber-500 to-yellow-500 text-white py-3 rounded-xl font-bold" onclick="processUpgrade()" id="upgradeConfirmBtn">
          <i class="fas fa-lock"></i> ${t.upgradeNow}
        </button>
        
        <p class="text-center text-xs text-gray-500 mt-4">
          <i class="fas fa-shield-alt"></i> ${t.securePayment}
        </p>
      `;
    }
    
    // ==================== UPGRADE LOGIC ====================
    let selectedPackage = 'monthly';
    let selectedPaymentMethod = 'm-pesa';
    let activePromo = null;
    let promoDiscount = 0;
    
    function selectPackage(pkg) {
      selectedPackage = pkg;
      document.querySelectorAll('.pricing-card').forEach(card => card.classList.remove('selected'));
      document.getElementById(pkg === 'monthly' ? 'monthlyPlan' : 'lifetimePlan').classList.add('selected');
      updatePriceSummary();
    }
    
    function selectPaymentMethod(method) {
      selectedPaymentMethod = method;
      document.querySelectorAll('.payment-method-btn').forEach(btn => {
        btn.style.borderColor = '#e0e8f0';
        btn.style.background = 'white';
      });
      const activeBtn = document.querySelector(`.payment-method-btn[data-method="${method}"]`);
      if (activeBtn) {
        activeBtn.style.borderColor = '#d99938';
        activeBtn.style.background = '#fff8e8';
      }
    }
    
    function applyPromoCode() {
      const t = translations[currentLang];
      const code = document.getElementById('promoCodeInput').value.trim();
      const promoResult = validatePromoCode(code, selectedPackage);
      
      if (promoResult.valid) {
        if (promoResult.isTrial) {
          activePromo = { code, discount: 100, isTrial: true, trialDays: promoResult.trialDays };
          promoDiscount = 100;
          document.getElementById('promoMessage').innerHTML = `<span class="text-green-600">✓ ${code} gives you a ${promoResult.trialDays}-day FREE trial!</span>`;
        } else {
          activePromo = { code, discount: promoResult.discount };
          promoDiscount = promoResult.discount;
          document.getElementById('promoMessage').innerHTML = `<span class="text-green-600">✓ ${code} gives ${promoResult.discount}% off!</span>`;
        }
      } else {
        activePromo = null;
        promoDiscount = 0;
        document.getElementById('promoMessage').innerHTML = `<span class="text-red-600">✗ ${promoResult.message}</span>`;
      }
      updatePriceSummary();
    }
    
    function updatePriceSummary() {
      const t = translations[currentLang];
      const basePrice = selectedPackage === 'monthly' ? 10000 : 150000;
      const discountedPrice = basePrice - (basePrice * promoDiscount / 100);
      const finalPrice = discountedPrice < 0 ? 0 : discountedPrice;
      
      document.getElementById('summarySubtotal').innerText = `TSh ${basePrice.toLocaleString()}`;
      if (promoDiscount > 0) {
        document.getElementById('summaryDiscountRow').style.display = 'flex';
        document.getElementById('summaryDiscount').innerText = `-TSh ${(basePrice * promoDiscount / 100).toLocaleString()}`;
      } else {
        document.getElementById('summaryDiscountRow').style.display = 'none';
      }
      document.getElementById('summaryTotal').innerText = `TSh ${finalPrice.toLocaleString()}`;
      document.getElementById('monthlyPrice').innerText = selectedPackage === 'monthly' ? `TSh ${finalPrice.toLocaleString()}` : 'TSh 10,000';
      document.getElementById('lifetimePrice').innerText = selectedPackage === 'lifetime' ? `TSh ${finalPrice.toLocaleString()}` : 'TSh 150,000';
    }
    
    async function processUpgrade() {
      const t = translations[currentLang];
      const statusDiv = document.getElementById('paymentStatus');
      const confirmBtn = document.getElementById('upgradeConfirmBtn');
      
      statusDiv.innerHTML = '<div class="text-blue-600"><i class="fas fa-spinner fa-spin"></i> Processing payment...</div>';
      confirmBtn.disabled = true;
      confirmBtn.style.opacity = '0.5';
      
      const result = await processPayment(selectedPackage, selectedPaymentMethod, activePromo?.code);
      
      if (result.success) {
        statusDiv.innerHTML = `<div class="text-green-600"><i class="fas fa-check-circle"></i> Payment successful! ${result.isTrial ? 'Your free trial has been activated!' : 'Welcome to Premium!'}</div>`;
        setTimeout(() => {
          closeUpgradeModal();
          renderApp();
          showToast(result.isTrial ? '🎉 Free trial activated! Enjoy premium features for 1 day!' : '🎉 Welcome to Premium! Enjoy unlimited features!', 'success');
        }, 2000);
      } else {
        statusDiv.innerHTML = '<div class="text-red-600"><i class="fas fa-times-circle"></i> Payment failed. Please try again.</div>';
        confirmBtn.disabled = false;
        confirmBtn.style.opacity = '1';
      }
    }
    
    function showUpgradeModal() {
      document.getElementById('upgradeModal').classList.add('active');
      const modalContent = document.getElementById('upgradeModalContent');
      if (modalContent) {
        modalContent.innerHTML = renderUpgradeModal();
        selectPackage(selectedPackage);
        selectPaymentMethod(selectedPaymentMethod);
        if (activePromo) {
          document.getElementById('promoCodeInput').value = activePromo.code;
          updatePriceSummary();
        }
      }
    }
    
    function closeUpgradeModal() {
      document.getElementById('upgradeModal').classList.remove('active');
    }
    
    function saveDemoCard() {
      const t = translations[currentLang];
      if (!currentUser) return;
      
      const savedCards = JSON.parse(localStorage.getItem('invitationCards') || '[]');
      const userCards = savedCards.filter(c => c.userId === currentUser.id);
      const isPremium = hasPremiumAccess(currentUser);
      
      if (!isPremium && userCards.length >= 5) {
        showToast(t.limitReached, 'warning');
        showUpgradeModal();
        return;
      }
      
      const eventType = document.getElementById('eventType')?.value || 'Event';
      const newCard = {
        id: Date.now(),
        userId: currentUser.id,
        eventType: eventType,
        createdAt: new Date().toISOString()
      };
      savedCards.unshift(newCard);
      localStorage.setItem('invitationCards', JSON.stringify(savedCards));
      
      if (currentUser) {
        currentUser.cardsCount = (currentUser.cardsCount || 0) + 1;
        saveCurrentUser();
      }
      showToast(t.cardSaved, 'success');
      renderApp();
    }
    
    function editCard(id) { showToast('Edit feature coming soon!', 'info'); }
    function deleteCard(id) {
      let savedCards = JSON.parse(localStorage.getItem('invitationCards') || '[]');
      savedCards = savedCards.filter(c => c.id !== id);
      localStorage.setItem('invitationCards', JSON.stringify(savedCards));
      renderApp();
      showToast('Card deleted', 'info');
    }
    
    // ==================== SETUP FUNCTIONS ====================
    function setupNameFields() {
      const container = document.getElementById('dynamicNamesContainer');
      if (container) {
        container.innerHTML = `<div class="form-group"><label>👨 ${translations[currentLang].firstName}</label><input type="text" id="firstName" value="Baraka John" class="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-sm"></div>`;
      }
    }
    
    function setupTemplateSelection() {
      document.querySelectorAll('.template-item').forEach(item => {
        item.addEventListener('click', () => {
          if (item.classList.contains('premium-lock-overlay')) {
            showUpgradeModal();
            return;
          }
          document.querySelectorAll('.template-item').forEach(i => i.classList.remove('selected'));
          item.classList.add('selected');
          currentTemplate = item.getAttribute('data-template');
          const customSection = document.getElementById('customBgUpload');
          if (customSection) customSection.style.display = currentTemplate === 'custom' ? 'block' : 'none';
          updateCardPreview();
        });
      });
      
      document.querySelectorAll('.border-shape').forEach(shape => {
        shape.addEventListener('click', () => {
          document.querySelectorAll('.border-shape').forEach(s => s.classList.remove('selected'));
          shape.classList.add('selected');
          currentBorder = shape.getAttribute('data-border');
          updateCardPreview();
        });
      });
      
      document.querySelectorAll('.font-option').forEach(opt => {
        opt.addEventListener('click', () => {
          document.querySelectorAll('.font-option').forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
          currentFont = opt.getAttribute('data-font');
          updateCardPreview();
        });
      });
      
      document.querySelectorAll('.color-option').forEach(opt => {
        opt.addEventListener('click', () => {
          document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
          currentTextColor = opt.getAttribute('data-color');
          updateCardPreview();
        });
      });
    }
    
    function handleCustomImageUpload(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          customImageData = ev.target.result;
          const previewDiv = document.getElementById('customImagePreview');
          if (previewDiv) previewDiv.innerHTML = `<img src="${customImageData}" style="max-width: 80px; border-radius: 5px;">`;
          const removeBtn = document.getElementById('removeCustomBtn');
          if (removeBtn) removeBtn.classList.remove('hidden');
          updateCardPreview();
        };
        reader.readAsDataURL(file);
      }
    }
    
    function removeCustomImage() {
      customImageData = null;
      const previewDiv = document.getElementById('customImagePreview');
      if (previewDiv) previewDiv.innerHTML = '';
      const removeBtn = document.getElementById('removeCustomBtn');
      if (removeBtn) removeBtn.classList.add('hidden');
      const fileInput = document.getElementById('customImage');
      if (fileInput) fileInput.value = '';
      updateCardPreview();
    }
    
    function setupAccordion(headerId, contentId, chevronId) {
      const h = document.getElementById(headerId), c = document.getElementById(contentId), ch = document.getElementById(chevronId);
      if(h && c) h.addEventListener('click', () => { c.classList.toggle('open'); if(ch) ch.classList.toggle('rotated'); });
    }
    
    // ==================== RENDER APP ====================
    function renderApp() {
      const container = document.getElementById('appContainer');
      if (!container) return;
      
      checkAndUpdateSubscription();
      
      let content = renderHeader();
      
      if (!currentUser) {
        if (currentPage === 'register') {
          content += renderRegisterPage();
        } else {
          content += renderLoginPage();
        }
      } else {
        if (currentPage === 'creator') {
          content += renderCreatorPage();
        } else if (currentPage === 'cards') {
          content += renderCardsPage();
        } else {
          content += renderCreatorPage();
        }
      }
      
      container.innerHTML = content;
      
      // Re-attach event listeners
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
          const page = item.getAttribute('data-page');
          if (page) switchPage(page);
        });
      });
      
      document.querySelectorAll('.lang-option').forEach(opt => {
        opt.addEventListener('click', (e) => {
          e.stopPropagation();
          const newLang = opt.getAttribute('data-lang');
          if (newLang) {
            currentLang = newLang;
            renderApp();
          }
        });
      });
      
      // Setup accordions
      setupAccordion('accordion1Header', 'accordion1Content', 'chevron1');
      setupAccordion('accordion2Header', 'accordion2Content', 'chevron2');
      setupAccordion('accordion3Header', 'accordion3Content', 'chevron3');
      
      // Setup template selection after DOM is ready
      setupTemplateSelection();
      setupNameFields();
      
      // Form input listeners
      ['eventType','familyName','honorific','guestName','day','fullDate','time','placeName','placeType','city','blessings','rsvp'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.addEventListener('input', updateCardPreview);
      });
      
      // Custom image upload
      const customImage = document.getElementById('customImage');
      if(customImage) customImage.addEventListener('change', handleCustomImageUpload);
      const removeCustomBtn = document.getElementById('removeCustomBtn');
      if(removeCustomBtn) removeCustomBtn.addEventListener('click', removeCustomImage);
      
      updateCardPreview();
    }
    
    // Expose global functions
    window.handleLogin = handleLogin;
    window.handleRegister = handleRegister;
    window.handleLogout = handleLogout;
    window.showLoginPage = showLoginPage;
    window.showRegisterPage = showRegisterPage;
    window.switchPage = switchPage;
    window.showUpgradeModal = showUpgradeModal;
    window.closeUpgradeModal = closeUpgradeModal;
    window.selectPackage = selectPackage;
    window.selectPaymentMethod = selectPaymentMethod;
    window.applyPromoCode = applyPromoCode;
    window.processUpgrade = processUpgrade;
    window.saveDemoCard = saveDemoCard;
    window.editCard = editCard;
    window.deleteCard = deleteCard;
    
    // Initialize demo user if none exists
    if (users.length === 0) {
      users.push({
        id: 1,
        fullName: 'Demo User',
        email: 'demo@invisys.com',
        password: 'demo123',
        subscription: { type: 'free', isActive: true },
        cardsCount: 0,
        createdAt: new Date().toISOString()
      });
      saveUsers();
    }
    
    // Start app
    renderApp();
  </script>
</body>
</html>
