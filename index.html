    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;

      overflow-x: hidden;
    }
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .content-overlay { position: relative; z-index: 10; max-width: 1500px; margin: 0 auto; padding: 1.2rem; }
    
    /* Glassmorphism Components */
    .glass-header {
      background: rgba(10, 25, 30, 0.85);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      border: 1px solid rgba(217, 153, 56, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(4px);
      border-radius: 1.5rem;
      border: 1px solid rgba(217, 153, 56, 0.2);
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
    }
    .glass-card:hover { transform: translateY(-3px); border-color: rgba(217, 153, 56, 0.4); }
    
    .btn-primary {
      background: linear-gradient(135deg, #d99938, #b87a28);
      transition: all 0.2s ease;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(217, 153, 56, 0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: linear-gradient(135deg, #1a5f6e, #0c4e5c); }
    
    /* Invitation Card - Fixed height without scrollbar */
    .invitation-card {
      width: 100%;
      max-width: 380px;
      height: 506px; /* Fixed height instead of aspect-ratio */
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
      margin: 0 auto;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .invitation-card:hover { transform: scale(1.02); }
    .card-bg-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .card-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      background: rgba(0, 0, 0, 0.35);
    }
    .card-border-layer {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      pointer-events: none;
    }

      top: 16px;
      left: 16px;
      right: 16px;
      bottom: 16px;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(3px);
      border-radius: 16px;

      height: 100%;

      text-align: center;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.4;

    .card-text-content::-webkit-scrollbar-thumb { background: rgba(217,153,56,0.5); border-radius: 10px; }

      bottom: 12px;
      left: 0;
      right: 0;

      font-size: 9px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);

    body.premium-user .watermark { display: none !important; }

      justify-content: space-between;

    .accordion-icon.rotated { transform: rotate(180deg); }

    .accordion-panel.open { max-height: 500px; }
    .accordion-inner { padding: 1rem; }
    
    /* Template & Border Grids */
    .template-grid, .border-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
      gap: 0.7rem;

    .template-option, .border-option {

      left: 0;

    // ==================== SECURITY & ENCRYPTION ====================
    const SECRET_KEY = 'InviSys2024SecureKey@Tanzania!';
    
    function encryptData(data) {
      return CryptoJS.AES.encrypt(JSON.stringify(data), SECRET_KEY).toString();
    }
    
    function decryptData(encryptedData) {
      try {
        const bytes = CryptoJS.AES.decrypt(encryptedData, SECRET_KEY);
        return JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
      } catch(e) { return null; }
    }
    
    // ==================== INDEXEDDB ====================
    let db = null;
    const DB_NAME = 'InviSysDB';
    const DB_VERSION = 2;
    
    function initDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => { db = request.result; resolve(db); };
        request.onupgradeneeded = (event) => {
          const database = event.target.result;
          if (!database.objectStoreNames.contains('users')) {
            database.createObjectStore('users', { keyPath: 'id' });
          }
          if (!database.objectStoreNames.contains('cards')) {
            database.createObjectStore('cards', { keyPath: 'id' });
          }
          if (!database.objectStoreNames.contains('session')) {
            database.createObjectStore('session', { keyPath: 'key' });
          }
        };
      });
    }
    
    async function saveToStore(storeName, data) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction([storeName], 'readwrite');
        tx.objectStore(storeName).put(data);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    
    async function getFromStore(storeName, key) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction([storeName], 'readonly');
        const request = tx.objectStore(storeName).get(key);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }
    
    async function getAllFromStore(storeName) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction([storeName], 'readonly');
        const request = tx.objectStore(storeName).getAll();
        request.onsuccess = () => resolve(request.result || []);
        request.onerror = () => reject(request.error);
      });
    }
    
    async function deleteFromStore(storeName, key) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction([storeName], 'readwrite');
        tx.objectStore(storeName).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    
    async function clearStore(storeName) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction([storeName], 'readwrite');
        tx.objectStore(storeName).clear();
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    
    // ==================== PARTICLE EFFECT ====================
    const particleCanvas = document.getElementById('particleCanvas');
    let particleCtx = particleCanvas.getContext('2d');
    let particles = [];
    
    function initParticles() {
      particleCanvas.width = window.innerWidth;
      particleCanvas.height = window.innerHeight;
      const count = Math.min(60, Math.floor(window.innerWidth / 25));
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * particleCanvas.width,
          y: Math.random() * particleCanvas.height,
          radius: 1 + Math.random() * 2,
          speed: 0.2 + Math.random() * 0.8,
          opacity: 0.08 + Math.random() * 0.15
        });
      }
    }
    
    function drawParticles() {
      if (!particleCtx) return;
      particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
      for (let p of particles) {
        particleCtx.beginPath();
        particleCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        particleCtx.fillStyle = `rgba(217, 153, 56, ${p.opacity})`;
        particleCtx.fill();
      }
    }
    
    function updateParticles() {
      for (let p of particles) {
        p.y += p.speed;
        if (p.y - p.radius > particleCanvas.height) {
          p.y = -p.radius;
          p.x = Math.random() * particleCanvas.width;
        }
      }
    }
    
    function animateParticles() {
      updateParticles();
      drawParticles();
      requestAnimationFrame(animateParticles);
    }
    
    window.addEventListener('resize', () => {
      particleCanvas.width = window.innerWidth;
      particleCanvas.height = window.innerHeight;

    // ==================== HELPER FUNCTIONS ====================
    function showToast(msg, type = 'success') {
      const toast = document.createElement('div');
      toast.className = 'toast-message';
      toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'} mr-2"></i>${msg}`;
      toast.style.background = type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#f59e0b';
      toast.style.color = 'white';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    
    function hasPremiumAccess(user) {
      if (!user?.subscription) return false;
      if (user.subscription.type === 'premium_lifetime') return true;
      if (user.subscription.type === 'premium_monthly' && user.subscription.endDate) {
        return new Date(user.subscription.endDate) > new Date();
      }
      if (user.subscription.type === 'trial' && user.subscription.endDate) {
        return new Date(user.subscription.endDate) > new Date();
      }
      return false;
    }
    
    function updatePremiumBodyClass() {
      const isPremium = currentUser ? hasPremiumAccess(currentUser) : false;
      if (isPremium) {
        document.body.classList.add('premium-user');
      } else {
        document.body.classList.remove('premium-user');
      }
    }
    
    // ==================== SAVE FORM STATE ====================
    function saveFormStateToLocal() {
      const inputs = ['eventType', 'familyName', 'honorific', 'guestName', 'firstName', 'secondName', 'day', 'date', 'time', 'venue', 'venueType', 'city', 'blessings', 'rsvp'];
      inputs.forEach(id => {
        const el = document.getElementById(id);
        if (el) formState[id] = el.value;
      });
      localStorage.setItem('invisys_form_state', JSON.stringify(formState));
    }
    
    function loadFormStateFromLocal() {
      const saved = localStorage.getItem('invisys_form_state');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          Object.assign(formState, parsed);
        } catch(e) {}
      }
    }
    
    function restoreFormValues() {
      Object.keys(formState).forEach(key => {
        const el = document.getElementById(key);
        if (el) el.value = formState[key];
      });
    }

      const honor = document.getElementById('honorific')?.value || formState.honorific;

      const day = document.getElementById('day')?.value || formState.day;
      const date = document.getElementById('date')?.value || formState.date;
      const time = document.getElementById('time')?.value || formState.time;
      const venue = document.getElementById('venue')?.value || formState.venue;
      const venueType = document.getElementById('venueType')?.value || formState.venueType;
      const city = document.getElementById('city')?.value || formState.city;
      const blessings = document.getElementById('blessings')?.value || formState.blessings;
      const rsvp = document.getElementById('rsvp')?.value || formState.rsvp;
      const first = document.getElementById('firstName')?.value || formState.firstName;
      const second = document.getElementById('secondName')?.value || formState.secondName;
      
      if (!guest.trim()) guest = '___________';
      const isWedding = (type === 'Wedding' || type === 'Harusi');
      const venueText = venueType === 'ukumbini' ? `at ${venue} Hall` : venueType === 'nyumbani' ? `at ${venue} Home` : `at ${venue} Hotel`;

        `their beloved child <div style="font-size:18px;font-weight:bold;margin:6px 0;color:${getContrastColor()}">${escapeHtml(first)}</div>`;
      
      let icons = "🌹 ✿ 🌸 ✿ 🌹";
      if (currentBorder === 'bubbles') icons = "🫧 ○ 🫧 ○ 🫧";
      if (currentBorder === 'stars') icons = "⭐ ✧ ⭐ ✧ ⭐";
      if (currentBorder === 'hearts') icons = "💖 ❤️ 💖 ❤️ 💖";
      
      return `

        <div style="font-size:11px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;border-bottom:1.5px solid rgba(255,255,255,0.4);display:inline-block;padding-bottom:4px">INVITATION</div>

        <div style="font-size:10px;line-height:1.5;margin:6px 0">to the celebration ${type} ${couple}</div>
        <div style="font-size:10px;line-height:1.5;margin:6px 0">On <strong>${escapeHtml(day)}, ${escapeHtml(date)}</strong> at <strong>${escapeHtml(time)}</strong><br>${venueText}, ${escapeHtml(city)}</div>
        ${blessings ? `<div style="font-size:9px;font-style:italic;margin:8px 0;padding:6px;background:rgba(255,255,255,0.12);border-radius:10px">✨ ${escapeHtml(blessings)} ✨</div>` : ''}

    function getContrastColor() {
      // Auto-adjust text color for better contrast based on background
      if (currentTemplate === 'golden' || currentTemplate === 'sunset') {
        return '#2d3748'; // Dark text for light backgrounds
      }
      return currentTextColor;
    }
    
    function updateCardPreview() {
      const contentDiv = document.getElementById('cardTextContent');

    // ==================== AUTHENTICATION ====================
    async function handleLogin(e) {
      e.preventDefault();
      const t = translations[currentLang];
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      
      if (!email || !password) { showToast(t.invalidEmail, 'error'); return; }
      
      const users = await getAllFromStore('users');
      const user = users.find(u => u.email === email);
      
      if (user) {
        const decryptedPassword = decryptData(user.password);
        if (decryptedPassword === password) {
          currentUser = { ...user };
          delete currentUser.password;
          await saveToStore('session', { key: 'currentUser', value: encryptData(currentUser), timestamp: Date.now() });
          updatePremiumBodyClass();
          showToast('Login successful!', 'success');
          currentPage = 'creator';
          renderApp();
        } else {
          showToast(t.loginError, 'error');
        }
      } else {
        showToast(t.loginError, 'error');
      }
    }
    
    async function handleRegister(e) {
      e.preventDefault();
      const t = translations[currentLang];
      const fullName = document.getElementById('regFullName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirmPassword').value;
      
      if (!fullName) { showToast('Please enter full name', 'error'); return; }
      if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) { showToast(t.invalidEmail, 'error'); return; }
      if (password.length < 6) { showToast(t.passwordShort, 'error'); return; }
      if (password !== confirm) { showToast(t.passwordMismatch, 'error'); return; }
      
      const users = await getAllFromStore('users');
      if (users.some(u => u.email === email)) { showToast(t.emailExists, 'error'); return; }
      
      const newUser = {
        id: Date.now(),
        fullName,
        email,
        password: encryptData(password),
        subscription: { type: 'free', isActive: true },
        cardsCount: 0,
        createdAt: new Date().toISOString()
      };
      
      await saveToStore('users', newUser);
      showToast(t.registerSuccess, 'success');
      currentPage = 'login';
      renderApp();
    }
    
    async function handleLogout() {
      currentUser = null;
      await clearStore('session');
      updatePremiumBodyClass();
      currentPage = 'login';
      renderApp();
      showToast('Logged out successfully', 'info');
    }
    
    // ==================== CARD MANAGEMENT ====================
    async function saveCard() {
      if (!currentUser) return;
      const t = translations[currentLang];
      const cards = await getAllFromStore('cards');
      const userCards = cards.filter(c => c.userId === currentUser.id);
      const isPremium = hasPremiumAccess(currentUser);
      
      if (!isPremium && userCards.length >= 5) {
        showToast(t.limitReached, 'error');
        showUpgradeModal();
        return;
      }
      
      const cardData = {
        id: Date.now(),
        userId: currentUser.id,
        eventType: document.getElementById('eventType')?.value || formState.eventType,
        familyName: document.getElementById('familyName')?.value || formState.familyName,
        honorific: document.getElementById('honorific')?.value || formState.honorific,
        guestName: document.getElementById('guestName')?.value || formState.guestName,
        firstName: document.getElementById('firstName')?.value || formState.firstName,
        secondName: document.getElementById('secondName')?.value || formState.secondName,
        day: document.getElementById('day')?.value || formState.day,
        date: document.getElementById('date')?.value || formState.date,
        time: document.getElementById('time')?.value || formState.time,
        venue: document.getElementById('venue')?.value || formState.venue,
        venueType: document.getElementById('venueType')?.value || formState.venueType,
        city: document.getElementById('city')?.value || formState.city,
        blessings: document.getElementById('blessings')?.value || formState.blessings,
        rsvp: document.getElementById('rsvp')?.value || formState.rsvp,
        template: currentTemplate,
        border: currentBorder,
        font: currentFont,
        textColor: currentTextColor,
        customImage: customImageData,
        createdAt: new Date().toISOString()
      };
      
      await saveToStore('cards', cardData);
      currentUser.cardsCount = (currentUser.cardsCount || 0) + 1;
      await saveToStore('users', currentUser);
      showToast(t.cardSaved, 'success');
      renderApp();
    }

    async function downloadCard(id) {
      const cardElement = document.getElementById('invitationCardPreview');
      if (!cardElement) return;
      try {
        // For custom images, use proxy or CORS-enabled images
        const canvas = await html2canvas(cardElement, { 
          scale: 2, 
          backgroundColor: null,
          useCORS: true,
          allowTaint: false
        });
        const link = document.createElement('a');
        link.download = `invitation_${id}.png`;
        link.href = canvas.toDataURL();
        link.click();

    function closeUpgradeModal() { document.getElementById('upgradeModal')?.classList.remove('active'); }
    function selectPackage(pkg) { 
      selectedPackage = pkg;

      document.querySelectorAll('.pricing-card').forEach(card => card.classList.remove('selected'));
      if (pkg === 'monthly') document.getElementById('monthlyCard')?.classList.add('selected');

      document.querySelector(`.network-option[data-network="${network}"]`)?.classList.add('selected');

      selectedPaymentMethod = method;

    function updatePriceSummary() {
      const base = selectedPackage === 'monthly' ? 10000 : 150000;
      document.getElementById('summaryTotal') && (document.getElementById('summaryTotal').innerText = `TSh ${base.toLocaleString()}`);
    }
    
    function applyPromoCode() {
      const code = document.getElementById('promoInput')?.value.trim();
      if (!code) { showToast('Enter promo code', 'error'); return; }
      if (code.toUpperCase() === 'TRIAL7') {
        showToast('7-day free trial activated!', 'success');
        document.getElementById('summaryTotal').innerText = 'TSh 0';
      } else if (code.toUpperCase() === 'WELCOME20') {
        showToast('20% discount applied!', 'success');
        const base = selectedPackage === 'monthly' ? 10000 : 150000;
        document.getElementById('summaryTotal').innerText = `TSh ${Math.floor(base * 0.8).toLocaleString()}`;
      } else {
        showToast('Invalid promo code', 'error');
      }
    }
    
    async function processUpgrade() {
      const phone = document.getElementById('phoneInput')?.value.trim();
      if (!phone || phone.length < 10) { showToast('Enter valid phone number', 'error'); return; }
      
      const statusDiv = document.getElementById('paymentStatus');
      const confirmBtn = document.getElementById('upgradeConfirmBtn');
      if (statusDiv) statusDiv.innerHTML = '<div class="text-blue-600"><i class="fas fa-spinner fa-spin"></i> Processing...</div>';
      if (confirmBtn) confirmBtn.disabled = true;
      
      await new Promise(resolve => setTimeout(resolve, 2000));
      
      const endDate = selectedPackage === 'monthly' ? new Date(Date.now() + 30 * 86400000).toISOString() : null;
      currentUser.subscription = {
        type: selectedPackage === 'monthly' ? 'premium_monthly' : 'premium_lifetime',
        startDate: new Date().toISOString(),
        endDate: endDate,
        isActive: true
      };
      await saveToStore('users', currentUser);
      updatePremiumBodyClass();
      
      if (statusDiv) statusDiv.innerHTML = '<div class="text-green-600"><i class="fas fa-check-circle"></i> Payment Successful! Welcome to Premium!</div>';
      showToast('Welcome to Premium!', 'success');
      setTimeout(() => { closeUpgradeModal(); renderApp(); }, 1500);
    }

    function setupAccordions() {
      const accordions = ['accordion1', 'accordion2', 'accordion3'];
      accordions.forEach(id => {
        const trigger = document.getElementById(id);
        if (trigger) {
          trigger.addEventListener('click', () => {
            const panelId = trigger.dataset.panel;
            const panel = document.getElementById(panelId);
            const icon = trigger.querySelector('.accordion-icon');
            if (panel) {
              panel.classList.toggle('open');
              if (icon) icon.classList.toggle('rotated');
            }
          });
        }
      });
    }
    
    function setupCustomImageUpload() {
      const fileInput = document.getElementById('customImageFile');
      if (fileInput) {
        fileInput.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
              customImageData = ev.target.result;
              const preview = document.getElementById('customPreview');
              if (preview) preview.innerHTML = `<img src="${customImageData}" class="h-16 rounded-lg object-cover mx-auto">`;
              const removeBtn = document.getElementById('removeCustomBtn');
              if (removeBtn) removeBtn.classList.remove('hidden');
              if (currentTemplate === 'custom') updateCardPreview();
            };
            reader.readAsDataURL(file);
          }
        });
      }
      const removeBtn = document.getElementById('removeCustomBtn');
      if (removeBtn) {
        removeBtn.addEventListener('click', () => {
          customImageData = null;
          const preview = document.getElementById('customPreview');
          if (preview) preview.innerHTML = '';
          removeBtn.classList.add('hidden');
          if (document.getElementById('customImageFile')) document.getElementById('customImageFile').value = '';
          if (currentTemplate === 'custom') updateCardPreview();
        });
      }
    }

      const inputs = ['eventType', 'familyName', 'honorific', 'guestName', 'firstName', 'secondName', 'day', 'date', 'time', 'venue', 'venueType', 'city', 'blessings', 'rsvp'];
      inputs.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.removeEventListener('input', saveFormStateToLocal);
          el.removeEventListener('input', updateCardPreview);

        </div>
        <div class="bg-gray-50 rounded-xl p-4 mb-4"><div class="flex gap-2"><input type="text" id="promoInput" class="flex-1 p-2 border rounded-xl" placeholder="${t.promoCode}"><button class="btn-secondary px-4 rounded-xl text-white" onclick="applyPromoCode()">${t.apply}</button></div><div id="promoMsg" class="text-xs mt-2"></div></div>
        <div class="grid md:grid-cols-2 gap-4 mb-4"><div><label class="block text-sm font-semibold mb-2">${t.selectNetwork}</label><div class="flex gap-2"><button class="network-option flex-1 p-2 border rounded-lg ${selectedNetwork === 'mpesa' ? 'selected border-amber-500' : ''}" data-network="mpesa" onclick="selectNetwork('mpesa')"><i class="fas fa-mobile-alt text-green-600"></i><span class="block text-xs">M-PESA</span></button><button class="network-option flex-1 p-2 border rounded-lg ${selectedNetwork === 'tigo' ? 'selected border-amber-500' : ''}" data-network="tigo" onclick="selectNetwork('tigo')"><i class="fas fa-mobile-alt text-blue-600"></i><span class="block text-xs">Tigo Pesa</span></button><button class="network-option flex-1 p-2 border rounded-lg ${selectedNetwork === 'airtel' ? 'selected border-amber-500' : ''}" data-network="airtel" onclick="selectNetwork('airtel')"><i class="fas fa-mobile-alt text-red-600"></i><span class="block text-xs">Airtel</span></button></div></div><div><label class="block text-sm font-semibold mb-2">${t.phoneNumber}</label><input type="tel" id="phoneInput" class="w-full p-2 border rounded-lg" placeholder="0712345678"></div></div>
        <div class="mb-4"><label class="block text-sm font-semibold mb-2">${t.paymentMethod}</label><div class="flex gap-2"><button class="payment-option flex-1 p-2 border rounded-lg ${selectedPaymentMethod === 'mpesa' ? 'selected border-amber-500' : ''}" data-method="mpesa" onclick="selectPaymentMethod('mpesa')"><i class="fab fa-amazon-pay text-green-600"></i><span class="block text-xs">M-PESA</span></button><button class="payment-option flex-1 p-2 border rounded-lg ${selectedPaymentMethod === 'bank' ? 'selected border-amber-500' : ''}" data-method="bank" onclick="selectPaymentMethod('bank')"><i class="fas fa-university text-blue-600"></i><span class="block text-xs">Bank</span></button><button class="payment-option flex-1 p-2 border rounded-lg ${selectedPaymentMethod === 'card' ? 'selected border-amber-500' : ''}" data-method="card" onclick="selectPaymentMethod('card')"><i class="fab fa-cc-visa text-purple-600"></i><span class="block text-xs">Card</span></button></div></div>
        <div class="bg-amber-50 rounded-xl p-4 mb-4"><div class="flex justify-between py-2"><span>${t.total}:</span><span id="summaryTotal" class="text-xl font-bold text-amber-600">TSh 10,000</span></div></div>
        <div id="paymentStatus" class="text-center mb-3"></div>
        <button id="upgradeConfirmBtn" class="w-full btn-primary py-3 rounded-xl font-bold text-white" onclick="processUpgrade()"><i class="fas fa-lock mr-2"></i>${t.upgradeNow}</button>`;
    }
    
    // ==================== APP INITIALIZATION ====================
    window.switchPage = (page) => { currentPage = page; renderApp(); };
    window.handleLogin = handleLogin;
    window.handleRegister = handleRegister;
    window.handleLogout = handleLogout;
    window.saveCard = saveCard;
    window.editCard = editCard;
    window.deleteCard = deleteCard;
    window.downloadCard = downloadCard;
    window.showUpgradeModal = showUpgradeModal;
    window.closeUpgradeModal = closeUpgradeModal;
    window.selectPackage = selectPackage;
    window.selectNetwork = selectNetwork;
    window.selectPaymentMethod = selectPaymentMethod;
    window.applyPromoCode = applyPromoCode;
    window.processUpgrade = processUpgrade;
    
    async function renderApp() {
      const root = document.getElementById('appRoot');
      if (!root) return;
      
      let html = renderHeader();
      
      if (!currentUser) {
        const session = await getFromStore('session', 'currentUser');
        if (session) {
          const userData = decryptData(session.value);
          if (userData && userData.id) {
            currentUser = userData;
            updatePremiumBodyClass();
          }
        }
      }
      
      if (!currentUser) {
        if (currentPage === 'register') html += renderRegisterPage();
        else html += renderLoginPage();
      } else {
        if (currentPage === 'creator') html += await renderCreatorPage();
        else if (currentPage === 'cards') html += await renderCardsPage();
        else html += await renderCreatorPage();
      }
      
      root.innerHTML = html;
      
      if (currentUser && currentPage === 'creator') {
        loadFormStateFromLocal();
        restoreFormValues();
        setupNameFields();
        populateTemplateGrid();
        populateBorderGrid();
        populateFontAndColor();
        setupAccordions();
        setupCustomImageUpload();
        attachFormListeners();
        
        const eventType = document.getElementById('eventType');
        if (eventType) eventType.addEventListener('change', setupNameFields);
        
        updateCardPreview();
      }
      
      // Language switchers - use changeLanguage to preserve form state
      document.querySelectorAll('.lang-switch').forEach(btn => {
        btn.addEventListener('click', () => {
          const lang = btn.dataset.lang;
          if (lang) changeLanguage(lang);
        });
      });
      
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => { 
          const page = btn.dataset.page; 
          if (page) switchPage(page); 
        });
      });
      
      const modalContent = document.getElementById('upgradeModalContent');
      if (modalContent && document.getElementById('upgradeModal')?.classList.contains('active')) {
        modalContent.innerHTML = renderUpgradeModalContent();
        updatePriceSummary();
      }
    }
    
    // Start app
    initDatabase().then(() => {
      initParticles();
      animateParticles();
      renderApp();
    }).catch(err => {
      console.error('Database init failed:', err);
      document.getElementById('appRoot').innerHTML = '<div class="text-center text-white p-10">Failed to initialize app. Please refresh.</div>';
    });
  </script>
  
  <div id="upgradeModal" class="modal-overlay"><div class="modal-container" id="upgradeModalContent"></div></div>
</body>
</html>
