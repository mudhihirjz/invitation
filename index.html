<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Warm Greetings</title>
<style>
/* Simple reset to make background and spacing clean */
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
background: linear-gradient(135deg, #f9f3e6 0%, #ffe6f0 100%);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
padding: 20px;
}

/* Centered greeting card */
.greeting-card {
background: rgba(255, 255, 255, 0.92);
backdrop-filter: blur(2px);
border-radius: 48px;
box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1), 0 4px 12px rgba(0, 0, 0, 0.05);
padding: 2rem 2.5rem;
text-align: center;
max-width: 580px;
width: 100%;
transition: transform 0.2s ease;
border: 1px solid rgba(255, 255, 255, 0.5);
}

.greeting-card:hover {
transform: scale(1.01);
}

/* Main greeting headline */
h1 {
font-size: 3rem;
font-weight: 700;
color: #2d3e50;
margin-bottom: 1rem;
letter-spacing: -0.5px;
background: linear-gradient(120deg, #1f4e6e, #8b5e3c);
background-clip: text;
-webkit-background-clip: text;
color: transparent;
text-shadow: 2px 2px 12px rgba(0,0,0,0.05);
}

/* Sub-greeting / friendly message */
.welcome-message {
font-size: 1.4rem;
font-weight: 500;
color: #4a627a;
background: #fff8f0;
display: inline-block;
padding: 0.5rem 1.2rem;
border-radius: 60px;
margin: 0.75rem 0;
box-shadow: inset 0 1px 2px #00000008, 0 4px 8px rgba(0,0,0,0.02);
}

/* Friendly complementary text */
.friendly-text {
font-size: 1.1rem;
line-height: 1.5;
color: #4b5e72;
margin: 1.5rem 0 1rem;
padding: 0 0.5rem;
}

/* Decorative emoji row */
.emoji-row {
font-size: 2.4rem;
letter-spacing: 10px;
margin: 1rem 0 0.5rem;
opacity: 0.9;
}

/* Simple signature line */
.greeting-footer {
margin-top: 2rem;
font-size: 0.85rem;
color: #b38f6f;
border-top: 1px solid #f0e2d4;
padding-top: 1rem;
display: flex;
justify-content: center;
gap: 12px;
flex-wrap: wrap;
}

/* optional small button effect — just for style */
.smile {
background: none;
border: none;
font-size: 1rem;
cursor: default;
}

/* responsive: smaller screens look cozy */
@media (max-width: 480px) {
.greeting-card {
padding: 1.8rem 1.5rem;
}
h1 {
font-size: 2.2rem;
}
.welcome-message {
font-size: 1.1rem;
}
.friendly-text {
font-size: 1rem;
}
.emoji-row {
font-size: 1.9rem;
letter-spacing: 6px;
}
}

/* make greeting extra cheerful with no clutter */
.highlight {
font-weight: 600;
color: #c27e4a;
}
</style>
</head>
<body>

<div class="greeting-card">
<!-- main cheerful salutation -->
<h1>✨ Hello there! ✨</h1>

<!-- warm welcome message -->
<div class="welcome-message">
🌻 Good to see you 🌻
</div>

<!-- friendly greeting sentence -->
<div class="friendly-text">
👋 <span class="highlight">Greetings!</span> Wishing you a day filled with
warmth, peace, and a touch of joy.<br>
You are always welcome here.
</div>

<!-- decorative emojis for vibes -->
<div class="emoji-row">
☀️ 🌈 🌼 🕊️ 🌟
</div>

<!-- extra sweet greeting note -->
<div class="friendly-text" style="margin-top: 0.2rem; font-size: 0.95rem;">
“A simple <strong>hello</strong> could lead to a million smiles.”
</div>

<!-- small footer with more positive touch -->
<div class="greeting-footer">
<span>💛 Stay awesome</span>
<span>🌿  Karibu sana  🌿</span>
<span>⭐ Have a lovely moment</span>
</div>
</div>

</body>
</html>
